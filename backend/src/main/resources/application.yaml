spring:
  application:
    name: backend

  config: 
    import: optional:file:.env[.properties]

  datasource:
      url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}
  jackson:
    time-zone: Asia/Tokyo
  jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
